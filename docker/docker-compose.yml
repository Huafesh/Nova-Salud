version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: nova_salud_mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secretpassword
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
    name: nova_salud_mongo_data
